services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agewell
      POSTGRES_USER: agewell
      POSTGRES_PASSWORD: agewell
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5532:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agewell -d agewell"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: agewell
      MINIO_ROOT_PASSWORD: agewell-minio-pass
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-client:
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    profiles: ["seed"]
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 agewell agewell-minio-pass &&
      mc mb -p local/mlflow || true &&
      mc mb -p local/data || true &&
      mc mb -p local/models || true"

  mlflow:
    build: ./docker/mlflow
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: agewell
      AWS_SECRET_ACCESS_KEY: agewell-minio-pass
      MLFLOW_BACKEND_URI: postgresql+psycopg2://agewell:agewell@postgres:5432/mlflow
      MLFLOW_ARTIFACT_URI: s3://mlflow/
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "5000:5000"

  prefect:
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://agewell:agewell@postgres:5432/prefect
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4200:4200"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  inference:
    build:
      context: .
      dockerfile: docker/inference/Dockerfile
    environment:
      AGEWELL_ENV: local
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 5s
      timeout: 3s
      retries: 20

  dcm2niix-svc:
    profiles: ["imaging"]
    build:
      context: .
      dockerfile: docker/dcm2niix/Dockerfile
    volumes:
      - ./data:/data
    ports:
      - "8001:8000"

  bids-validator-svc:
    profiles: ["imaging"]
    build:
      context: .
      dockerfile: docker/bids_validator/Dockerfile
    volumes:
      - ./data:/data
    ports:
      - "8002:8000"

  brainiac-preprocess-svc:
    profiles: ["imaging"]
    build:
      context: .
      dockerfile: docker/brainiac_preprocess/Dockerfile
    environment:
      HDBET_PARAMS_DIR: /models/brainiac/hdbet
    volumes:
      - ./data:/data
      - ./models/brainiac:/models/brainiac:ro
    ports:
      - "8003:8000"
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, count: 1, capabilities: [gpu]}]

  brainiac-svc:
    profiles: ["imaging"]
    build:
      context: .
      dockerfile: docker/brainiac/Dockerfile
    volumes:
      - ./data:/data
      - ./models:/app/models:ro
    ports:
      - "8005:8000"
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, count: 1, capabilities: [gpu]}]

  qc-svc:
    profiles: ["imaging"]
    build:
      context: .
      dockerfile: docker/qc/Dockerfile
    volumes:
      - ./data:/data
    ports:
      - "8006:8000"

volumes:
  pgdata: {}
  miniodata: {}
