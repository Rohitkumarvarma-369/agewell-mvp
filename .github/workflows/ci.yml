name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.17"
          enable-cache: true
      - run: uv python install 3.11
      - run: uv sync --group dev
      - run: make lint
      - run: make test-unit

  services:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.17"
          enable-cache: true
      - run: uv python install 3.11
      - run: uv sync --group dev
      - run: make up
      - run: make test-integration
      - if: always()
        run: docker compose down -v
